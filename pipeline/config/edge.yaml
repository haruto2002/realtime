# config/app.yaml
_target_: pipeline.edge_app.EdgeApp
_recursive_: false

time_counter:
  _target_: pipeline.components.edge.timer.TimeCounter
  save_dir: results

reader:
  _target_: pipeline.components.edge.reader.FFmpegVideoReader
  # source: rtsp://member:AIST-rwdc@192.168.0.10:554/ONVIF/MediaInput?profile=def_profile1
  source: samples/vid/videos/hanabi.mp4
  size: [500, 500]
  output_fps: 30
  transport: udp
  frame_queue_maxsize: 100
  flush_on_queue_full: false

displayer:
  _target_: pipeline.components.edge.displayer.Displayer
  window_name: realtime
  maxsize: 100
  freq_to_report_fps: 100
  flush_on_queue_full: false
  report_single: false
  report_avg: true

publisher:
  _target_: pipeline.components.edge.publisher.Publisher
  broker_host: localhost
  broker_port: 1883
  camera_id: cam01
  pc_id: localhost

# MOT worker
worker:
  _target_: pipeline.components.edge.processor.MotProcessor
  detectors:
    - _target_: processor.components.Detector
      detector: 
        _target_: processor.detector.p2pnet.P2PNetDetector
        cfg_path: processor/modules/detector/p2pnet/conf/p2p.yaml
        weight_path: weights/p2pnet/cutout.pth
        device: cpu
        dtype: float16
        threshold: 0.1
        img_size: [500, 500]
      devide_size: null
    - _target_: processor.components.Detector
      detector: 
        _target_: processor.detector.yolo26.YOLODetector
        model_size: s
        weight_dir: weights/yolo26
        img_long_side: 1920
        device: cpu
        conf_threshold: 0.01
        classes: [1, 2, 3, 5, 6, 7] # bicycle, car, motorcycle, bus, train, truck
      devide_size: null
  trackers:
    - _target_: processor.components.Tracker
      tracker: 
        _target_: processor.tracker.point_bytetrack.PointByteTrackTracker
        track_thresh: 0.6
        track_buffer: 30
        match_thresh: 10.0
        distance_metric: euclidean
        frame_rate: 30
    - _target_: processor.components.Tracker
      tracker:
        _target_: processor.tracker.bytetrack.ByteTrackTracker
        track_thresh: 0.5
        track_buffer: 30
        match_thresh: 0.8
        mot20: False
        frame_rate: 30

max_wall_seconds: null